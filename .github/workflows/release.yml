name: Release DarkTasks

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.1.1"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install

      - name: Create env file
        shell: pwsh
        run: |
          "DATABASE_URL=${{ secrets.DATABASE_URL }}" | Out-File -FilePath .env -Encoding utf8
          "DATABASE_SSL=true" | Add-Content -Path .env
          "DATABASE_PREPARE=false" | Add-Content -Path .env
          "VITE_API_BASE_URL=http://127.0.0.1:8787/api" | Add-Content -Path .env
          "VITE_API_TIMEOUT_MS=15000" | Add-Content -Path .env
          "VITE_BOOTSTRAP_TIMEOUT_MS=15000" | Add-Content -Path .env

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.version || github.ref_name }}
          releaseName: "DarkTasks ${{ inputs.version || github.ref_name }}"
          releaseBody: "DarkTasks update ${{ inputs.version || github.ref_name }}"
          releaseDraft: false
          prerelease: false
